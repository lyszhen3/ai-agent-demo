# 模型配置文件
# 支持多种模型提供商，取消注释需要的模型并配置 API key

models:
  # OpenAI 模型
  openai:
    api_key: "your-openai-api-key"
    base_url: "https://api.openai.com/v1"
    models:
      - name: "gpt-4"
        display_name: "GPT-4"
      - name: "gpt-3.5-turbo"
        display_name: "GPT-3.5 Turbo"
      - name: "gpt-4-turbo"
        display_name: "GPT-4 Turbo"

